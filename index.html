<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>missedmybestie</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: #4b3428;
      color: white;
    }

    body {
      position: relative;
    }

    /* ===== BACKGROUND ===== */
    .bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,0,0,0.20), transparent 22%),
        radial-gradient(circle at 78% 26%, rgba(255,255,255,0.11), transparent 18%),
        radial-gradient(circle at 52% 82%, rgba(120,20,20,0.16), transparent 24%),
        linear-gradient(135deg, #654636 0%, #533b2f 38%, #432f24 72%, #35241c 100%);
    }

    .bg::before,
    .bg::after {
      content: "";
      position: absolute;
      inset: -10%;
      pointer-events: none;
    }

    /* more red / white streaks */
    .bg::before {
      background:
        repeating-linear-gradient(
          100deg,
          rgba(255,255,255,0.00) 0px,
          rgba(255,255,255,0.00) 24px,
          rgba(255,255,255,0.06) 24px,
          rgba(255,255,255,0.06) 30px,
          rgba(255,255,255,0.00) 30px,
          rgba(255,255,255,0.00) 68px,
          rgba(255,0,0,0.10) 68px,
          rgba(255,0,0,0.10) 78px,
          rgba(255,255,255,0.00) 78px,
          rgba(255,255,255,0.00) 120px
        );
      mix-blend-mode: screen;
      opacity: 0.95;
      transform: scale(1.1);
      animation: streakShift1 20s ease-in-out infinite alternate;
      filter: blur(0.5px);
    }

    .bg::after {
      background:
        repeating-linear-gradient(
          96deg,
          rgba(255,255,255,0.00) 0px,
          rgba(255,255,255,0.00) 34px,
          rgba(255,0,0,0.12) 34px,
          rgba(255,0,0,0.12) 44px,
          rgba(255,255,255,0.00) 44px,
          rgba(255,255,255,0.00) 84px,
          rgba(255,255,255,0.08) 84px,
          rgba(255,255,255,0.08) 92px,
          rgba(255,255,255,0.00) 92px,
          rgba(255,255,255,0.00) 138px
        );
      opacity: 0.75;
      animation: streakShift2 24s ease-in-out infinite alternate;
      mix-blend-mode: screen;
      filter: blur(1px);
    }

    @keyframes streakShift1 {
      0% {
        transform: translateX(0) translateY(0) scale(1.08);
      }
      100% {
        transform: translateX(-22px) translateY(-8px) scale(1.12);
      }
    }

    @keyframes streakShift2 {
      0% {
        transform: translateX(0) translateY(0) scale(1.05);
      }
      100% {
        transform: translateX(18px) translateY(10px) scale(1.1);
      }
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.04;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.55) 0.5px, transparent 0.6px);
      background-size: 8px 8px;
      mix-blend-mode: soft-light;
    }

    /* ===== NAV ===== */
    .nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(255,0,0,0.15));
    }

    .brand span {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.8px;
    }

    .nav-right {
      display: flex;
      gap: 20px;
    }

    .nav-right a {
      text-decoration: none;
      color: white;
      font-size: 13px;
      letter-spacing: 0.5px;
      opacity: 0.95;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .nav-right a:hover {
      opacity: 0.65;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    .hero {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1400px;
      z-index: 5;
      padding: 20px;
    }

    .logo-stage {
      position: relative;
      width: 340px;
      height: 280px;
      transform-style: preserve-3d;
      animation: rotate3d 12s linear infinite;
    }

    @keyframes rotate3d {
      0% {
        transform: rotateX(2deg) rotateY(0deg);
      }
      100% {
        transform: rotateX(2deg) rotateY(360deg);
      }
    }

    .logo-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* wider / more 3D feeling */
    .main {
      transform: translateZ(0px) scaleX(1.16);
      filter:
        drop-shadow(0 26px 48px rgba(0,0,0,0.72))
        drop-shadow(0 0 24px rgba(255,0,0,0.35));
    }

    .depth1 {
      transform: translateZ(-12px) scaleX(1.19);
      opacity: 0.24;
      filter: brightness(0.45) saturate(1.1);
    }

    .depth2 {
      transform: translateZ(-24px) scaleX(1.23);
      opacity: 0.18;
      filter: brightness(0.33) saturate(1.08);
    }

    .depth3 {
      transform: translateZ(-36px) scaleX(1.27);
      opacity: 0.13;
      filter: brightness(0.23) saturate(1.05);
    }

    .depth4 {
      transform: translateZ(-48px) scaleX(1.31);
      opacity: 0.09;
      filter: brightness(0.15) saturate(1.02);
    }

    .glow {
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255,0,0,0.22), rgba(255,255,255,0.08), transparent 70%);
      filter: blur(32px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .nav {
        padding: 18px 18px;
      }

      .brand span {
        font-size: 13px;
      }

      .nav-right {
        gap: 12px;
      }

      .nav-right a {
        font-size: 12px;
      }

      .logo-stage {
        width: 250px;
        height: 210px;
      }

      .glow {
        width: 190px;
        height: 190px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <div class="nav">
    <div class="brand">
      <img src="logo.png" alt="missedmybestie logo">
      <span>missedmybestie</span>
    </div>

    <div class="nav-right">
      <a href="#">Home</a>
      <a href="#">Music</a>
      <a href="#">Contact</a>
      <a href="#">About</a>
    </div>
  </div>

  <div class="hero">
    <div class="logo-stage">
      <div class="glow"></div>

      <img src="logo.png" class="logo-layer depth4" alt="">
      <img src="logo.png" class="logo-layer depth3" alt="">
      <img src="logo.png" class="logo-layer depth2" alt="">
      <img src="logo.png" class="logo-layer depth1" alt="">
      <img src="logo.png" class="logo-layer main" alt="missedmybestie logo main">
    </div>
  </div>

</body>
</html>
