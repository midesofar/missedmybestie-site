<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>missedmybestie</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background: #1e130f;
      color: white;
      overflow: hidden;
    }

    body { position: relative; }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,0,0,0.08), transparent 22%),
        radial-gradient(circle at 75% 30%, rgba(255,255,255,0.04), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(90,20,20,0.08), transparent 24%),
        linear-gradient(135deg, #241713 0%, #1d120f 38%, #160d0b 70%, #100909 100%);
    }

    .zigzag-wrap {
      position: fixed; inset: 0; z-index: 1;
      overflow: hidden; opacity: 0.22;
      pointer-events: none; filter: blur(0.2px);
    }
    .zigzag {
      position: absolute; inset: -20%;
      background-repeat: repeat; background-size: 220px 220px;
      mix-blend-mode: screen; animation: drift 24s linear infinite;
    }
    .zigzag.red {
      background-image: linear-gradient(135deg,
        transparent 0 39%, rgba(255,0,0,0.18) 39% 43%, transparent 43% 50%,
        rgba(255,0,0,0.18) 50% 54%, transparent 54% 61%,
        rgba(255,0,0,0.18) 61% 65%, transparent 65% 100%);
    }
    .zigzag.white {
      background-image: linear-gradient(45deg,
        transparent 0 40%, rgba(255,255,255,0.10) 40% 44%, transparent 44% 51%,
        rgba(255,255,255,0.10) 51% 55%, transparent 55% 62%,
        rgba(255,255,255,0.10) 62% 66%, transparent 66% 100%);
      animation-duration: 30s; animation-direction: reverse; opacity: 0.85;
    }
    @keyframes drift {
      from { transform: translate3d(0,0,0) scale(1.05); }
      to   { transform: translate3d(-70px,-40px,0) scale(1.1); }
    }
    .grain {
      position: fixed; inset: 0; z-index: 2; opacity: 0.035;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.5) 0.5px, transparent 0.6px);
      background-size: 9px 9px; mix-blend-mode: soft-light;
    }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 26px 34px; display: flex;
      justify-content: flex-end; align-items: center;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(20,10,8,0.7) 0%, transparent 100%);
    }
    .nav-right { display: flex; gap: 22px; }
    .nav-right a {
      text-decoration: none; color: rgba(255,255,255,0.92);
      font-size: 13px; font-weight: 400; letter-spacing: 0.5px;
      cursor: pointer; transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .nav-right a:hover { opacity: 0.6; transform: translateY(-1px); }
    .nav-right a.active { opacity: 1; border-bottom: 1px solid rgba(255,0,0,0.7); padding-bottom: 2px; }

    /* PAGES */
    .page {
      position: fixed; inset: 0; bottom: 86px;
      z-index: 5; opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .page.active { opacity: 1; pointer-events: all; }

    /* HOME */
    #page-home {
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      perspective: 1500px; text-align: center; padding: 20px;
    }
    .logo-stage {
      position: relative; width: 460px; height: 360px;
      transform-style: preserve-3d; animation: rotate3d 14s linear infinite;
    }
    @keyframes rotate3d {
      0%   { transform: rotateX(6deg) rotateY(-28deg); }
      25%  { transform: rotateX(4deg) rotateY(0deg); }
      50%  { transform: rotateX(6deg) rotateY(28deg); }
      75%  { transform: rotateX(4deg) rotateY(0deg); }
      100% { transform: rotateX(6deg) rotateY(-28deg); }
    }
    .logo-layer {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; user-select: none;
      -webkit-user-drag: none; pointer-events: none;
    }
    .main {
      transform: translateZ(0px) scaleX(1.20) scaleY(1.06);
      filter: drop-shadow(0 28px 55px rgba(0,0,0,0.72))
              drop-shadow(0 0 26px rgba(255,0,0,0.30))
              drop-shadow(0 0 12px rgba(255,255,255,0.10));
    }
    .depth1 { transform: translateZ(-14px) scaleX(1.24) scaleY(1.06); opacity: 0.24; filter: brightness(0.48) saturate(1.08); }
    .depth2 { transform: translateZ(-28px) scaleX(1.28) scaleY(1.06); opacity: 0.17; filter: brightness(0.34) saturate(1.05); }
    .depth3 { transform: translateZ(-42px) scaleX(1.32) scaleY(1.06); opacity: 0.12; filter: brightness(0.24) saturate(1.02); }
    .depth4 { transform: translateZ(-56px) scaleX(1.36) scaleY(1.06); opacity: 0.08; filter: brightness(0.16); }
    .glow {
      position: absolute; width: 330px; height: 330px;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(255,0,0,0.18), rgba(255,255,255,0.06), transparent 72%);
      filter: blur(40px); z-index: -1; pointer-events: none;
    }
    .coming-soon {
      margin-top: 10px; font-size: 14px; font-weight: 400;
      letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.82);
    }

    /* MUSIC PAGE */
    #page-music { overflow-y: auto; overflow-x: hidden; }
    .music-inner { max-width: 900px; margin: 0 auto; padding: 120px 40px 40px; }
    .music-header { margin-bottom: 52px; }
    .music-header h1 { font-size: clamp(28px,5vw,52px); font-weight: 600; letter-spacing: -1px; line-height: 1; margin-bottom: 8px; }
    .music-header .sub { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 2.5px; text-transform: uppercase; }
    .section-label {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,0,0,0.75); margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
    .featured-section { margin-bottom: 56px; }
    .tracks-section   { margin-bottom: 56px; }
    .artist-section   { margin-bottom: 48px; }
    .embed-wrap { border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }
    .embed-wrap iframe { display: block; width: 100%; border: none; border-radius: 10px; filter: brightness(0.96) contrast(1.02) saturate(0.85); }
    .track-embeds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .track-embed-item { border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.015); transition: border-color 0.3s, box-shadow 0.3s; }
    .track-embed-item:hover { border-color: rgba(255,0,0,0.2); box-shadow: 0 0 24px rgba(255,0,0,0.06); }
    .track-embed-item iframe { display: block; width: 100%; border: none; filter: brightness(0.95) saturate(0.8); }
    .footer-note { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; text-align: center; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.05); }

    /* ============================
       PLAYER BAR
    ============================ */
    #player {
      position: fixed; bottom: 0; left: 0;
      width: 100%; height: 86px; z-index: 30;
      background: rgba(10,5,4,0.94);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center;
      padding: 0 28px; gap: 24px;
    }
    #player::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,0,0,0.45) 40%, rgba(255,0,0,0.45) 60%, transparent 100%);
    }

    /* progress glow line synced to playback */
    #player::after {
      content: ''; position: absolute; top: 0; left: 0;
      height: 1px; background: rgba(255,0,0,0.9);
      width: var(--progress, 0%);
      transition: width 0.5s linear;
    }

    .player-info {
      display: flex; align-items: center; gap: 14px;
      min-width: 200px; flex: 1; overflow: hidden;
    }

    .player-art {
      width: 50px; height: 50px; border-radius: 5px; flex-shrink: 0;
      background: #110908;
      border: 1px solid rgba(255,0,0,0.18);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .player-art svg { transition: transform 0.3s; }
    .player-art.playing svg { animation: spin-vinyl 5s linear infinite; }
    @keyframes spin-vinyl {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .player-title {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 170px;
    }
    .player-artist {
      font-size: 11px; color: rgba(255,255,255,0.36);
      margin-top: 3px; letter-spacing: 0.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 170px;
    }

    .player-center {
      flex: 2; display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }

    .player-controls { display: flex; align-items: center; gap: 20px; }

    .ctrl-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.5); cursor: pointer;
      padding: 4px; display: flex; align-items: center;
      transition: color 0.2s, transform 0.15s;
    }
    .ctrl-btn:hover { color: white; transform: scale(1.12); }

    .play-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: white; color: #120908 !important;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(255,255,255,0.15);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s !important;
    }
    .play-btn:hover {
      background: rgba(255,255,255,0.88) !important;
      box-shadow: 0 0 28px rgba(255,0,0,0.25) !important;
      transform: scale(1.06) !important;
    }

    .progress-wrap {
      width: 100%; max-width: 500px;
      display: flex; align-items: center; gap: 10px;
    }
    .time-label { font-size: 10px; color: rgba(255,255,255,0.28); min-width: 32px; text-align: center; }

    .progress-bar {
      flex: 1; height: 3px; background: rgba(255,255,255,0.08);
      border-radius: 3px; cursor: pointer; position: relative;
      transition: height 0.15s;
    }
    .progress-bar:hover { height: 5px; }
    .progress-fill {
      height: 100%; background: white; border-radius: 3px; width: 0%;
      position: relative; pointer-events: none;
      transition: width 0.5s linear;
    }
    .progress-fill::after {
      content: ''; position: absolute; right: -5px; top: 50%;
      transform: translateY(-50%); width: 10px; height: 10px;
      border-radius: 50%; background: white; opacity: 0; transition: opacity 0.15s;
    }
    .progress-bar:hover .progress-fill::after { opacity: 1; }

    .player-right {
      flex: 1; display: flex; align-items: center;
      justify-content: flex-end; gap: 16px; min-width: 180px;
    }

    .vol-wrap { display: flex; align-items: center; gap: 8px; }
    .vol-icon { color: rgba(255,255,255,0.4); cursor: pointer; }
    .vol-icon:hover { color: rgba(255,255,255,0.8); }

    .vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 82px; height: 3px;
      background: rgba(255,255,255,0.14); border-radius: 3px;
      outline: none; cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: white; cursor: pointer;
    }
    .vol-slider::-moz-range-thumb {
      width: 13px; height: 13px; border-radius: 50%;
      background: white; cursor: pointer; border: none;
    }

    .tracklist-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.09); border-radius: 4px;
      color: rgba(255,255,255,0.42); cursor: pointer;
      padding: 5px 10px; font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; font-family: 'Space Grotesk', sans-serif;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .tracklist-btn:hover { border-color: rgba(255,0,0,0.4); color: white; }
    .tracklist-btn.open  { border-color: rgba(255,0,0,0.55); color: white; background: rgba(255,0,0,0.05); }

    /* TRACKLIST PANEL */
    #tracklist-panel {
      position: fixed; bottom: 86px; right: 0;
      width: 300px; max-height: 420px; overflow-y: auto;
      z-index: 29;
      background: rgba(8,4,3,0.97);
      backdrop-filter: blur(28px);
      border-top: 1px solid rgba(255,255,255,0.06);
      border-left: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px 0 0 0;
      transform: translateY(110%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    #tracklist-panel.open { transform: translateY(0); }

    .tracklist-header {
      padding: 14px 18px 10px;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,0,0,0.65);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: sticky; top: 0;
      background: rgba(8,4,3,0.97);
    }

    .tracklist-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 18px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.18s;
    }
    .tracklist-item:hover { background: rgba(255,255,255,0.035); }
    .tracklist-item.active { background: rgba(255,0,0,0.07); }

    .tracklist-num {
      font-size: 11px; color: rgba(255,255,255,0.22);
      width: 18px; text-align: center; flex-shrink: 0;
    }
    .tracklist-item.active .tracklist-num { color: transparent; }

    .tracklist-text { overflow: hidden; flex: 1; }
    .tracklist-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tracklist-sub { font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 2px; }

    .eq-bars {
      display: none; gap: 2px; align-items: flex-end; height: 14px; flex-shrink: 0;
    }
    .tracklist-item.active .eq-bars { display: flex; }
    .eq-bar {
      width: 3px; border-radius: 2px; background: rgba(255,0,0,0.75);
      animation: eq 0.55s ease infinite alternate;
    }
    .eq-bar:nth-child(1) { height: 5px; animation-delay: 0s; }
    .eq-bar:nth-child(2) { height: 10px; animation-delay: 0.18s; }
    .eq-bar:nth-child(3) { height: 7px; animation-delay: 0.34s; }
    @keyframes eq {
      from { opacity: 0.5; transform: scaleY(0.5); }
      to   { opacity: 1;   transform: scaleY(1.4); }
    }

    /* SCROLLBAR */
    #tracklist-panel::-webkit-scrollbar { width: 4px; }
    #tracklist-panel::-webkit-scrollbar-track { background: transparent; }
    #tracklist-panel::-webkit-scrollbar-thumb { background: rgba(255,0,0,0.2); border-radius: 2px; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav { padding: 18px; }
      .nav-right { gap: 12px; }
      .nav-right a { font-size: 12px; }
      .logo-stage { width: 290px; height: 230px; }
      .glow { width: 220px; height: 220px; }
      .coming-soon { font-size: 12px; letter-spacing: 2px; }
      .music-inner { padding: 100px 18px 40px; }
      .track-embeds-grid { grid-template-columns: 1fr; }
      #player { padding: 0 16px; gap: 14px; }
      .player-info { min-width: 120px; }
      .player-title { max-width: 110px; }
      #tracklist-panel { width: 100%; border-left: none; border-radius: 10px 10px 0 0; }
    }
    @media (max-width: 500px) {
      .player-artist { display: none; }
      .time-label { display: none; }
      .vol-wrap { display: none; }
      #player { gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="zigzag-wrap">
    <div class="zigzag red"></div>
    <div class="zigzag white"></div>
  </div>
  <div class="grain"></div>

  <!-- NAV -->
  <div class="nav">
    <div class="nav-right">
      <a onclick="showPage('home')" class="active" id="nav-home">Home</a>
      <a onclick="showPage('music')" id="nav-music">Music</a>
      <a href="#">Contact</a>
      <a href="#">About</a>
      <a href="#">Clothing</a>
    </div>
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="logo-stage">
      <div class="glow"></div>
      <img src="logo.png" class="logo-layer depth4" alt="">
      <img src="logo.png" class="logo-layer depth3" alt="">
      <img src="logo.png" class="logo-layer depth2" alt="">
      <img src="logo.png" class="logo-layer depth1" alt="">
      <img src="logo.png" class="logo-layer main" alt="missedmybestie logo">
    </div>
    <div class="coming-soon">Coming Soon</div>
  </div>

  <!-- MUSIC PAGE -->
  <div class="page" id="page-music">
    <div class="music-inner">
      <div class="music-header">
        <h1>Music</h1>
        <div class="sub">missedmybestie · 2023–2026</div>
      </div>
      <div class="featured-section">
        <div class="section-label">Latest Release</div>
        <div class="embed-wrap">
          <iframe src="https://open.spotify.com/embed/album/6xxxEYsqhree6X9WPCIVgB?utm_source=generator&theme=0"
            height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>
      <div class="tracks-section">
        <div class="section-label">Popular Tracks</div>
        <div class="track-embeds-grid">
          <div class="track-embed-item"><iframe src="https://open.spotify.com/embed/album/6fXUG18YLJd7lnZoQJ3SGg?utm_source=generator&theme=0" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>
          <div class="track-embed-item"><iframe src="https://open.spotify.com/embed/album/2OpV8XBb9DGxzXUGSGf72n?utm_source=generator&theme=0" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>
          <div class="track-embed-item"><iframe src="https://open.spotify.com/embed/album/5yp7oswUEJpTGlOfSdY4T2?utm_source=generator&theme=0" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>
          <div class="track-embed-item"><iframe src="https://open.spotify.com/embed/album/4woCIlNJMLNICjZljr3Ydr?utm_source=generator&theme=0" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>
          <div class="track-embed-item"><iframe src="https://open.spotify.com/embed/album/6hG1AJjEG1RRJO5hETwa8L?utm_source=generator&theme=0" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>
          <div class="track-embed-item"><iframe src="https://open.spotify.com/embed/album/3nq50xAffaV75KzSA6qhAQ?utm_source=generator&theme=0" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>
        </div>
      </div>
      <div class="artist-section">
        <div class="section-label">Full Discography</div>
        <div class="embed-wrap">
          <iframe src="https://open.spotify.com/embed/artist/3wz072OZ5ZkxD6D6Io5XfI?utm_source=generator&theme=0"
            height="352" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>
      <div class="footer-note">Streaming via Spotify · missedmybestie © 2026</div>
    </div>
  </div>

  <!-- PLAYER BAR -->
  <div id="player">
    <div class="player-info">
      <div class="player-art" id="player-art">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <circle cx="15" cy="15" r="13" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
          <circle cx="15" cy="15" r="5" fill="rgba(255,255,255,0.12)"/>
          <circle cx="15" cy="15" r="2" fill="rgba(255,0,0,0.65)"/>
          <path d="M15 2 A13 13 0 0 1 28 15" stroke="rgba(255,0,0,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M15 28 A13 13 0 0 1 2 15" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="player-title" id="player-title">—</div>
        <div class="player-artist" id="player-artist">missedmybestie</div>
      </div>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()" title="Next">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="progress-wrap">
        <span class="time-label" id="time-current">0:00</span>
        <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time-label" id="time-total">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <div class="vol-wrap">
        <svg class="vol-icon" id="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" onclick="toggleMute()">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM19 12c0 2.93-1.65 5.48-4 6.77v2.06c3.37-1.41 5.76-4.72 5.76-8.83S18.37 4.64 15 3.23v2.06C17.35 6.52 19 9.07 19 12z"/>
        </svg>
        <input class="vol-slider" id="vol-slider" type="range" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
      </div>
      <button class="tracklist-btn" id="tracklist-btn" onclick="toggleTracklist()">Tracks</button>
    </div>
  </div>

  <!-- TRACKLIST PANEL -->
  <div id="tracklist-panel">
    <div class="tracklist-header">Tracklist — missedmybestie</div>
    <div id="tracklist-items"></div>
  </div>

  <audio id="audio" preload="auto"></audio>

  <script>
    const tracks = [
      { title: "Depuis Que J'Rap",  artist: "2society & missedmybestie",   src: "1776041834793_DEPUIS_QUE_J_RAP__2society___mmb_.wav" },
      { title: "For My Bestie",      artist: "Mide — missedmybestie",        src: "1776041859357_for_my_bestie__prod_mide_.mp3" },
      { title: "The Godfather",      artist: "Mide & missedmybestie",        src: "1776041861882_the_godfather_afrotrap_v1__mide___mmb_.mp3" },
      { title: "Let Me Hold You",    artist: "missedmybestie",               src: "1776041874714_let_me_hold_you__143_bpm__nine_vicious_type_beat_-___missedmybestie_.wav" },
      { title: "But Today",          artist: "missedmybestie",               src: "1776041879722_but_today_nine_vicious_type_beat_v2.mp3" },
      { title: "Mr. & My Miss",      artist: "missedmybestie & Mide",        src: "mr_and_my_miss.mp3" },
      { title: "Goin' Steady",       artist: "missedmybestie & Mide",        src: "1776041894033_goin__steady__nine_vicious_type_beat___148_bpm____missedmybestie___mide_.wav" },
      { title: "Merci (Angola)",     artist: "missedmybestie",               src: "1776041906458_merci__angola_afrobeats_type_beat__-_first_beat_for_flora__125_bpm_.wav" },
      { title: "Eu Quero",           artist: "Mide & ervobeats",             src: "1776041909268_eu_quero_-_3rd_beat_for_flora__135_bpm__-_mide__ervobeats_.wav" }
    ];

    let currentIndex = 0;
    let isPlaying = false;
    let isMuted = false;
    let lastVol = 0.8;

    const audio        = document.getElementById('audio');
    const playIcon     = document.getElementById('play-icon');
    const playerArt    = document.getElementById('player-art');
    const playerTitle  = document.getElementById('player-title');
    const playerArtist = document.getElementById('player-artist');
    const progressFill = document.getElementById('progress-fill');
    const timeCurrent  = document.getElementById('time-current');
    const timeTotal    = document.getElementById('time-total');
    const volSlider    = document.getElementById('vol-slider');
    const playerEl     = document.getElementById('player');

    function buildTracklist() {
      const c = document.getElementById('tracklist-items');
      c.innerHTML = '';
      tracks.forEach((t, i) => {
        const el = document.createElement('div');
        el.className = 'tracklist-item' + (i === currentIndex ? ' active' : '');
        el.id = 'tl-' + i;
        el.onclick = () => loadTrack(i, true);
        el.innerHTML = `
          <span class="tracklist-num">${i + 1}</span>
          <div class="tracklist-text">
            <div class="tracklist-name">${t.title}</div>
            <div class="tracklist-sub">${t.artist}</div>
          </div>
          <div class="eq-bars">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
          </div>`;
        c.appendChild(el);
      });
    }

    function loadTrack(index, autoplay) {
      currentIndex = index;
      const t = tracks[index];
      audio.src = t.src;
      audio.volume = parseFloat(volSlider.value);
      playerTitle.textContent  = t.title;
      playerArtist.textContent = t.artist;
      progressFill.style.width = '0%';
      timeCurrent.textContent  = '0:00';
      timeTotal.textContent    = '0:00';
      playerEl.style.setProperty('--progress', '0%');
      buildTracklist();
      if (autoplay) {
        audio.play().catch(() => {});
      }
    }

    function togglePlay() {
      if (audio.src === '' || !audio.src) { loadTrack(0, true); return; }
      if (audio.paused) { audio.play().catch(() => {}); }
      else { audio.pause(); }
    }

    function updatePlayIcon() {
      playerArt.classList.toggle('playing', isPlaying);
      playIcon.innerHTML = isPlaying
        ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
        : '<path d="M8 5v14l11-7z"/>';
    }

    function prevTrack() {
      if (audio.currentTime > 3) { audio.currentTime = 0; return; }
      loadTrack((currentIndex - 1 + tracks.length) % tracks.length, isPlaying);
    }
    function nextTrack() {
      loadTrack((currentIndex + 1) % tracks.length, isPlaying);
    }

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      playerEl.style.setProperty('--progress', pct + '%');
      timeCurrent.textContent = fmt(audio.currentTime);
    });
    audio.addEventListener('loadedmetadata', () => { timeTotal.textContent = fmt(audio.duration); });
    audio.addEventListener('ended', nextTrack);
    audio.addEventListener('play',  () => { isPlaying = true;  updatePlayIcon(); });
    audio.addEventListener('pause', () => { isPlaying = false; updatePlayIcon(); });

    function seekTo(e) {
      const bar = document.getElementById('progress-bar');
      const rect = bar.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      if (audio.duration) audio.currentTime = pct * audio.duration;
    }

    function fmt(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function setVolume(v) {
      audio.volume = parseFloat(v);
      lastVol = audio.volume;
      isMuted = audio.volume === 0;
    }

    function toggleMute() {
      if (isMuted) {
        audio.volume = lastVol || 0.8;
        volSlider.value = audio.volume;
        isMuted = false;
      } else {
        lastVol = audio.volume;
        audio.volume = 0;
        volSlider.value = 0;
        isMuted = true;
      }
    }

    function toggleTracklist() {
      document.getElementById('tracklist-panel').classList.toggle('open');
      document.getElementById('tracklist-btn').classList.toggle('open');
    }

    document.addEventListener('click', e => {
      const panel = document.getElementById('tracklist-panel');
      const btn   = document.getElementById('tracklist-btn');
      if (!panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('open');
        btn.classList.remove('open');
      }
    });

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-right a[id^="nav-"]').forEach(a => a.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      const navLink = document.getElementById('nav-' + name);
      if (navLink) navLink.classList.add('active');
      document.getElementById('page-music').style.overflowY = name === 'music' ? 'auto' : 'hidden';
    }

    // Init
    buildTracklist();
    loadTrack(0, false);
    audio.volume = 0.8;

    // Autoplay on first click (browser policy)
    document.addEventListener('click', function startAudio() {
      if (audio.paused && !isPlaying) {
        audio.play().catch(() => {});
      }
      document.removeEventListener('click', startAudio);
    });
  </script>

</body>
</html>
