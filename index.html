<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>missedmybestie</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: #1e130f;
      color: white;
    }

    body {
      position: relative;
    }

    /* ===== DARK BACKGROUND ===== */
    .bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 0, 0, 0.08), transparent 22%),
        radial-gradient(circle at 75% 30%, rgba(255, 255, 255, 0.04), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(90, 20, 20, 0.08), transparent 24%),
        linear-gradient(135deg, #241713 0%, #1d120f 38%, #160d0b 70%, #100909 100%);
    }

    /* ===== ZIGZAG OVERLAY ===== */
    .zigzag-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      opacity: 0.22;
      pointer-events: none;
      filter: blur(0.2px);
    }

    .zigzag {
      position: absolute;
      inset: -20%;
      background-repeat: repeat;
      background-size: 220px 220px;
      mix-blend-mode: screen;
      animation: drift 24s linear infinite;
    }

    .zigzag.red {
      background-image:
        linear-gradient(135deg,
          transparent 0 39%,
          rgba(255,0,0,0.18) 39% 43%,
          transparent 43% 50%,
          rgba(255,0,0,0.18) 50% 54%,
          transparent 54% 61%,
          rgba(255,0,0,0.18) 61% 65%,
          transparent 65% 100%);
    }

    .zigzag.white {
      background-image:
        linear-gradient(45deg,
          transparent 0 40%,
          rgba(255,255,255,0.10) 40% 44%,
          transparent 44% 51%,
          rgba(255,255,255,0.10) 51% 55%,
          transparent 55% 62%,
          rgba(255,255,255,0.10) 62% 66%,
          transparent 66% 100%);
      animation-duration: 30s;
      animation-direction: reverse;
      opacity: 0.85;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0) scale(1.05);
      }
      to {
        transform: translate3d(-70px, -40px, 0) scale(1.1);
      }
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.035;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.5) 0.5px, transparent 0.6px);
      background-size: 9px 9px;
      mix-blend-mode: soft-light;
    }

    /* ===== NAV ===== */
    .nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 26px 34px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      z-index: 10;
    }

    .nav-right {
      display: flex;
      gap: 22px;
    }

    .nav-right a {
      text-decoration: none;
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.5px;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .nav-right a:hover {
      opacity: 0.6;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    .hero {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      perspective: 1500px;
      text-align: center;
      padding: 20px;
    }

    .logo-stage {
      position: relative;
      width: 460px;
      height: 360px;
      transform-style: preserve-3d;
      animation: rotate3d 14s linear infinite;
    }

    @keyframes rotate3d {
      0% {
        transform: rotateX(2deg) rotateY(0deg);
      }
      100% {
        transform: rotateX(2deg) rotateY(360deg);
      }
    }

    .logo-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .main {
      transform: translateZ(0px) scaleX(1.20) scaleY(1.06);
      filter:
        drop-shadow(0 28px 55px rgba(0,0,0,0.72))
        drop-shadow(0 0 26px rgba(255,0,0,0.30))
        drop-shadow(0 0 12px rgba(255,255,255,0.10));
    }

    .depth1 {
      transform: translateZ(-14px) scaleX(1.24) scaleY(1.06);
      opacity: 0.24;
      filter: brightness(0.48) saturate(1.08);
    }

    .depth2 {
      transform: translateZ(-28px) scaleX(1.28) scaleY(1.06);
      opacity: 0.17;
      filter: brightness(0.34) saturate(1.05);
    }

    .depth3 {
      transform: translateZ(-42px) scaleX(1.32) scaleY(1.06);
      opacity: 0.12;
      filter: brightness(0.24) saturate(1.02);
    }

    .depth4 {
      transform: translateZ(-56px) scaleX(1.36) scaleY(1.06);
      opacity: 0.08;
      filter: brightness(0.16);
    }

    .glow {
      position: absolute;
      width: 330px;
      height: 330px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,0,0,0.18), rgba(255,255,255,0.06), transparent 72%);
      filter: blur(40px);
      z-index: -1;
      pointer-events: none;
    }

    .coming-soon {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
    }

    @media (max-width: 768px) {
      .nav {
        padding: 18px 18px;
      }

      .nav-right {
        gap: 12px;
      }

      .nav-right a {
        font-size: 12px;
      }

      .logo-stage {
        width: 290px;
        height: 230px;
      }

      .glow {
        width: 220px;
        height: 220px;
      }

      .coming-soon {
        font-size: 12px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="zigzag-wrap">
    <div class="zigzag red"></div>
    <div class="zigzag white"></div>
  </div>

  <div class="grain"></div>

  <div class="nav">
    <div class="nav-right">
      <a href="#">Home</a>
      <a href="#">Music</a>
      <a href="#">Contact</a>
      <a href="#">About</a>
      <a href="#">Closing</a>
    </div>
  </div>

  <main class="hero">
    <div class="logo-stage">
      <div class="glow"></div>

      <img src="logo.png" class="logo-layer depth4" alt="">
      <img src="logo.png" class="logo-layer depth3" alt="">
      <img src="logo.png" class="logo-layer depth2" alt="">
      <img src="logo.png" class="logo-layer depth1" alt="">
      <img src="logo.png" class="logo-layer main" alt="missedmybestie logo">
    </div>

    <div class="coming-soon">Coming Soon</div>
  </main>

</body>
</html>
